name: دانلود فایل

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'لینک فایل'
        required: true
        type: string

jobs:
  get:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: دانلود
        run: |
          mkdir -p dl
          cd dl
          wget --no-check-certificate "${{ inputs.link }}"
          
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: فایل جدید
          file_pattern: dl/*
